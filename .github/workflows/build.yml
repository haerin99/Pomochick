name: Build

on:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Windows
        run: npm run build -- --win --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pomochick-windows
          path: dist/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm install
      - name: Build Mac
        run: npm run build -- --mac --publish never
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pomochick-mac
          path: dist/*.dmg